[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "master-thesis-ivqr"
version = "0.1.0"
description = "Monte Carlo simulation project for IVQR and DML-IVQR estimators."
requires-python = ">=3.10"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--basetemp=.pytest_tmp -p no:ddtrace -p no:cacheprovider"
markers = [
    "slow: long-running simulation, multiprocessing, or subprocess smoke tests",
]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
python = ">=3.10,<3.13"
numpy = "*"
pandas = "*"
scipy = "*"
scikit-learn = "*"
statsmodels = "*"
matplotlib = "*"
pytest = "*"

[tool.pixi.pypi-dependencies]
master-thesis-ivqr = { path = ".", editable = true }

[tool.pixi.tasks]
fast_mode = "python scenarios/run_simulation.py --mode fast"
full_mode = "python scenarios/run_simulation.py --mode full"
full_control_fast = "python scenarios/run_simulation.py --mode fast --estimators full_control"
full_control = "python scenarios/full_control_ivqr.py"
import_check = "python -c \"import config; import estimators; import simulation; import inference; import reporting\""
test_project = "pytest tests -m 'not slow'"
test_slow = "pytest tests -m slow"
