[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "master-thesis-ivqr"
version = "0.1.0"
description = "Monte Carlo simulation project for IVQR and DML-IVQR estimators."
requires-python = ">=3.10"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "--basetemp=.pytest_tmp -p no:ddtrace -p no:cacheprovider"
markers = [
    "slow: long-running simulation, multiprocessing, or subprocess smoke tests",
]

[tool.pixi.workspace]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tool.pixi.dependencies]
python = ">=3.10,<3.13"
numpy = "*"
pandas = "*"
scipy = "*"
scikit-learn = "*"
statsmodels = "*"
matplotlib = "*"
pytest = "*"

[tool.pixi.pypi-dependencies]
master-thesis-ivqr = { path = ".", editable = true }

[tool.pixi.tasks]
fast = "python scenarios/run_simulation.py --mode fast"
full = "python scenarios/run_simulation.py --mode full"
smoke = "python scenarios/run_simulation.py --mode fast --estimators full_control --reps 1 --dgps dgp1 --n-values 80 --p-values 5 --pi-values 1.0 --taus 0.5 --max-designs 1 --n-jobs 1 --alpha-grid-size 5 --no-reports --output results/raw/smoke_full_control.csv --manifest results/raw/smoke_full_control_manifest.json"
import_check = "python -c \"import dgp; import estimators; import ivqr; import simulation; import reporting\""
test = "pytest tests -m 'not slow'"
test_slow = "pytest tests -m slow"
